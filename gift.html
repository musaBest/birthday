<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri&display=swap" rel="stylesheet">
<title>عيد ميلاد ضحى ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    overflow:hidden;
    font-family:'Cairo',sans-serif;
    background: radial-gradient(circle,#040404,#000);
}

/* الاسم */
.name{
    position:absolute;
    top:38%;
    left:50%;
    transform:translate(-50%,-50%);
    font-family:'Amiri',serif;
    font-size:clamp(32px,6vw,60px);
    color:#ffccd5;
    text-align:center;
    opacity:0;
    transition:1s;
    text-shadow:
        0 0 10px #ff4d6d,
        0 0 25px #ff0033,
        0 0 50px rgba(255,0,0,0.6);
}
.name.show{opacity:1;}

/* الرسالة */
.message{
    position:absolute;
    top:72%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    max-width:650px;
    color:#ffdbe3;
    text-align:center;
    font-size:clamp(20px,3.5vw,28px);
    line-height:2;
    white-space:pre-line;
}

/* التوقيع */
.signature{
    position:absolute;
    bottom:30px;
    width:100%;
    text-align:center;
    color:#ff9bb0;
    font-size:22px;
    opacity:0;
    transition:1s;
}
.signature.show{opacity:1;}

#musicButton{
    position:absolute;
    top:10px;
    right:10px;
    padding:8px 14px;
    background:#ff0033;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    z-index:100;
}
</style>
</head>

<body>

<button id="musicButton">تشغيل الموسيقى 🎵</button>

<canvas id="canvas"></canvas>

<div class="name" id="name">
✨ ضُحــى ✨<br>
💖 خالتي الغالية 💖
</div>

<div class="message" id="msg"></div>
<div class="signature" id="sign">💌 بكل الحب، مصعب</div>

<audio id="music" src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3" loop></audio>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function resize(){
    canvas.width=innerWidth;
    canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

/* شرارات */
let sparks=Array.from({length:120},()=>( {
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    s:Math.random()*1.5,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5,
    alpha:Math.random(),
    dAlpha:(Math.random()*0.02+0.005)
}));

/* القلب */
function heart(t){
    return {
        x: 15 * Math.pow(Math.sin(t), 3),
        y: -(
            12 * Math.cos(t) -
            5 * Math.cos(2 * t) -
            2 * Math.cos(3 * t) -
            Math.cos(4 * t)
        )
    };
}

/* جزيئات */
let particles=Array.from({length:1000},()=>{
    let t=Math.random()*Math.PI*2;
    let p=heart(t);
    return {
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        tx:canvas.width/2+p.x*16,
        ty:canvas.height/2+p.y*16,
        size:0,
        max:Math.random()*2+1.5,
        speed:Math.random()*0.01+0.008
    };
});

let scale=1;
let ti=0;
let started=false; // مهم جداً

/* الرسالة */
const text=`💖 اللهم في يوم ميلاد خالتي الحبيبة ضُحى 💖

اجعل أيامها مليئة بالفرح الذي لا ينتهي 🌸
وارزقها سعادة تملأ قلبها وراحة لا تفارق روحها 🤍
واحفظها بعينك التي لا تنام، وبارك في عمرها وصحتها يا رب 🌹

✨ كل عام وأنتِ أجمل نعمة في حياتنا ✨
🎂 وكل عام وأنتِ بخير وسعادة لا تنتهي 🎂`;

function type(){
    if(ti<text.length){
        document.getElementById("msg").innerHTML+=text[ti++];
        setTimeout(type,30);
    } else {
        document.getElementById("sign").classList.add("show");
    }
}

/* زر الموسيقى */
document.getElementById("musicButton").onclick=()=>{
    document.getElementById("music").play();
    document.getElementById("musicButton").style.display='none';
};

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* شرارات */
    sparks.forEach(s=>{
        s.x+=s.dx;
        s.y+=s.dy;
        s.alpha+=s.dAlpha;

        if(s.alpha>1||s.alpha<0) s.dAlpha*=-1;
        if(s.x>canvas.width) s.x=0;
        if(s.x<0) s.x=canvas.width;
        if(s.y>canvas.height) s.y=0;
        if(s.y<0) s.y=canvas.height;

        ctx.fillStyle=`rgba(255,255,255,${s.alpha})`;
        ctx.fillRect(s.x,s.y,s.s,s.s);
    });

    /* نبض القلب */
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    scale=1+Math.sin(Date.now()*0.003)*0.05;
    ctx.scale(scale, scale);
    ctx.translate(-canvas.width/2, -canvas.height/2);

    let done=true;

    particles.forEach(p=>{
        p.x+=(p.tx-p.x)*p.speed;
        p.y+=(p.ty-p.y)*p.speed;

        if(p.size<p.max) p.size+=0.02;
        if(Math.abs(p.x-p.tx)>0.5) done=false;

        let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*7);
        g.addColorStop(0,"#ff9bb0");
        g.addColorStop(0.3,"#ff4d6d");
        g.addColorStop(0.6,"#ff0033");
        g.addColorStop(1,"transparent");

        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fill();
    });

    ctx.restore();

    /* تشغيل مرة واحدة فقط */
    if(done && !started){
        started = true;
        document.getElementById("name").classList.add("show");
        type(); // يبدأ فوراً بدون انتظار
    }

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
